<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>smoothtime — NTP without the trauma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .clock { font-size: 5.5rem; font-family: monospace; letter-spacing: 0.05em; }
    @media (max-width: 640px) { .clock { font-size: 3.8rem; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans">
  <div class="max-w-2xl mx-auto px-6 py-16 text-center">
    
    <h1 class="text-6xl font-bold tracking-tighter mb-2">smoothtime</h1>
    <p class="text-emerald-400 text-xl mb-10">NTP without the twice-yearly trauma</p>

    <div class="bg-zinc-900 rounded-3xl p-10 mb-10 shadow-2xl">
      <div id="clock" class="clock text-emerald-400">00:00:00</div>
      <div id="region" class="text-zinc-400 mt-3 text-lg"></div>
      <div id="offset" class="text-emerald-500 font-mono mt-1">+1.000 h</div>
    </div>

    <!-- Region Buttons -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-12">
      <button onclick="switchRegion('cet')" id="btn-cet" class="px-6 py-3 rounded-2xl font-medium transition bg-emerald-600">CET/CEST</button>
      <button onclick="switchRegion('eest')" id="btn-eest" class="px-6 py-3 rounded-2xl font-medium transition bg-zinc-800">EET/EEST</button>
      <button onclick="switchRegion('us-east')" id="btn-us-east" class="px-6 py-3 rounded-2xl font-medium transition bg-zinc-800">US Eastern</button>
      <button onclick="switchRegion('us-pacific')" id="btn-us-pacific" class="px-6 py-3 rounded-2xl font-medium transition bg-zinc-800">US Pacific</button>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-8 text-left max-w-md mx-auto">
      <h2 class="text-xl font-semibold mb-4">How to use it</h2>
      <code onclick="copyCommand('cet')" id="cmd-cet" class="block bg-black p-4 rounded-2xl text-emerald-400 cursor-pointer hover:text-emerald-300 mb-3">server cet.smoothtime.io iburst</code>
      <code onclick="copyCommand('eest')" id="cmd-eest" class="block bg-black p-4 rounded-2xl text-emerald-400 cursor-pointer hover:text-emerald-300 mb-3">server eest.smoothtime.io iburst</code>
      <code onclick="copyCommand('us-east')" id="cmd-us-east" class="block bg-black p-4 rounded-2xl text-emerald-400 cursor-pointer hover:text-emerald-300 mb-3">server us-east.smoothtime.io iburst</code>
      <code onclick="copyCommand('us-pacific')" id="cmd-us-pacific" class="block bg-black p-4 rounded-2xl text-emerald-400 cursor-pointer hover:text-emerald-300">server us-pacific.smoothtime.io iburst</code>
    </div>

    <p class="text-xs text-zinc-500 mt-16">
      Open Source • MIT • 
      <a href="https://github.com/tommodore/smoothtime" class="text-emerald-400 hover:underline">github.com/tommodore/smoothtime</a>
    </p>
  </div>

  <script>
    const regions = {
      cet:        { name: "Central Europe (CET/CEST)",   base: 1.0,  dstEnd: "2025-10-26", dstStart: "2026-03-29" },
      eest:       { name: "Eastern Europe (EET/EEST)",   base: 2.0,  dstEnd: "2025-10-26", dstStart: "2026-03-29" },
      "us-east":  { name: "US Eastern (EST/EDT)",        base: -5.0, dstEnd: "2025-11-02", dstStart: "2026-03-08" },
      "us-pacific":{ name: "US Pacific (PST/PDT)",        base: -8.0, dstEnd: "2025-11-02", dstStart: "2026-03-08" }
    };

    let currentRegion = "cet";

    function smoothOffset() {
      const cfg = regions[currentRegion];
      const dstEnd   = new Date(cfg.dstEnd   + "T00:00:00Z");
      const dstStart = new Date(cfg.dstStart + "T00:00:00Z");
      const now      = new Date();

      const totalDays = (dstStart - dstEnd) / (86400000);
      const daysPassed = (now - dstEnd) / (86400000);

      const fraction = Math.max(0, Math.min(1, daysPassed / totalDays));
      return cfg.base + 1.0 * fraction;   // linear von +1h → +2h (bzw. -5 → -4 usw.)
    }

    function updateClock() {
      const offsetH = smoothOffset();
      const utcNow = new Date();
      const smoothTime = new Date(utcNow.getTime() + offsetH * 3600 * 1000);

      document.getElementById("clock").textContent = 
        smoothTime.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

      document.getElementById("region").textContent = regions[currentRegion].name;
      document.getElementById("offset").textContent = `+${offsetH.toFixed(3)} h`;
    }

    function switchRegion(region) {
      currentRegion = region;
      ["cet","eest","us-east","us-pacific"].forEach(r => {
        const btn = document.getElementById(`btn-${r}`);
        if (btn) btn.classList.toggle("bg-emerald-600", r === region);
        if (btn) btn.classList.toggle("bg-zinc-800", r !== region);
      });
      updateClock();
    }

    function copyCommand(region) {
      navigator.clipboard.writeText(`server ${region}.smoothtime.io iburst`);
      const el = document.getElementById(`cmd-${region}`);
      const orig = el.textContent;
      el.textContent = "✅ Copied!";
      setTimeout(() => el.textContent = orig, 1500);
    }

    // Auto-detect region
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    if (["America/New_York","America/Toronto"].includes(tz)) currentRegion = "us-east";
    else if (["America/Los_Angeles","America/Vancouver"].includes(tz)) currentRegion = "us-pacific";
    else currentRegion = ["Europe/Bucharest","Europe/Helsinki","Europe/Riga","Europe/Tallinn","Europe/Vilnius","Europe/Sofia","Europe/Athens"].includes(tz) ? "eest" : "cet";

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
